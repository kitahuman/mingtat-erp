services:
  backend:
    image: ghcr.io/kitahuman/mingtat-erp-backend:latest
    container_name: mingtat-erp-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - /opt/mingtat-erp/backend/.env
    volumes:
      - /opt/mingtat-erp/backend/uploads:/app/uploads
    networks:
      - mingtat-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://127.0.0.1:3001/api/health',res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>{try{const b=JSON.parse(d);process.exit(b.status==='ok'||b.status==='degraded'?0:1)}catch{process.exit(1)}})});r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/kitahuman/mingtat-erp-frontend:latest
    container_name: mingtat-erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mingtat-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  mingtat-network:
    driver: bridge
