services:
  backend:
    image: ghcr.io/kitahuman/mingtat-erp-backend:latest
    container_name: mingtat-erp-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - /opt/mingtat-erp/backend/.env
    volumes:
      - /opt/mingtat-erp/backend/uploads:/app/uploads
    networks:
      - mingtat-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://127.0.0.1:3001/api/auth/profile',res=>{process.exit(res.statusCode<500?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/kitahuman/mingtat-erp-frontend:latest
    container_name: mingtat-erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mingtat-network

networks:
  mingtat-network:
    driver: bridge
