services:
  backend:
    image: ghcr.io/kitahuman/mingtat-erp-backend:latest
    container_name: mingtat-erp-backend
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "3002:3001"
    env_file:
      - /opt/mingtat-erp/backend/.env
    volumes:
      - /opt/mingtat-erp/backend/uploads:/app/uploads
    networks:
      - mingtat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ghcr.io/kitahuman/mingtat-erp-frontend:latest
    container_name: mingtat-erp-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - BACKEND_URL=http://backend:3001
    networks:
      - mingtat-network

networks:
  mingtat-network:
    driver: bridge
