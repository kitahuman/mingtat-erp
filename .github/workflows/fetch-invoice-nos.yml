name: Fetch Invoice Numbers from DB

on:
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch Invoice Numbers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fetch DATABASE_URL and invoice numbers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          echo "=== DB_URL_START ==="
          cat /opt/mingtat-erp/backend/.env | grep DATABASE_URL
          echo "=== DB_URL_END ==="

          CONTAINER=$(docker ps --filter "name=backend" --format "{{.Names}}" | head -1)
          echo "Container: $CONTAINER"
          echo "=== INVOICE_NOS_START ==="
          docker exec "$CONTAINER" node -e "
          const {PrismaClient}=require('@prisma/client');
          const p=new PrismaClient();
          p.invoice.findMany({where:{deleted_at:null},select:{invoice_no:true}})
          .then(r=>{r.forEach(x=>console.log(x.invoice_no));p.\$disconnect()})
          .catch(e=>{console.error(e);process.exit(1)})
          "
          echo "=== INVOICE_NOS_END ==="
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
