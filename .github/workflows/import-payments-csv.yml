name: Import Payments from CSV

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (read-only, no modifications)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  import:
    name: Import Payments from CSV
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run import script inside backend container on EC2
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          echo "Running import script inside Docker container with DRY_RUN=${DRY_RUN}..."

          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
          set -e

          WORK_DIR="/opt/mingtat-erp"

          echo "=== Pulling latest code ==="
          cd "\${WORK_DIR}"
          git fetch origin main
          git reset --hard origin/main

          echo "=== Finding backend container ==="
          CONTAINER=\$(docker ps --filter "name=backend" --format "{{.Names}}" | head -1)
          if [ -z "\$CONTAINER" ]; then
            echo "ERROR: No running backend container found"
            docker ps
            exit 1
          fi
          echo "Using container: \$CONTAINER"

          echo "=== Copying CSV data file into container ==="
          docker cp "\${WORK_DIR}/backend/src/scripts/data/payment-in-import.csv" "\${CONTAINER}:/app/src/scripts/data/payment-in-import.csv" 2>/dev/null || \
          docker exec "\${CONTAINER}" mkdir -p /app/src/scripts/data && \
          docker cp "\${WORK_DIR}/backend/src/scripts/data/payment-in-import.csv" "\${CONTAINER}:/app/src/scripts/data/payment-in-import.csv"

          echo "=== Copying latest script into container ==="
          docker cp "\${WORK_DIR}/backend/src/scripts/import-payments-csv.ts" "\${CONTAINER}:/app/src/scripts/import-payments-csv.ts"

          echo "=== Running import script inside container ==="
          docker exec -e DRY_RUN="${DRY_RUN}" "\${CONTAINER}" npx ts-node --transpile-only /app/src/scripts/import-payments-csv.ts
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
