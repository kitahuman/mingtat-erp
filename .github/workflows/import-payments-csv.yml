name: Import Payments from CSV

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (read-only, no modifications)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  import:
    name: Import Payments from CSV
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run import script on EC2
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          echo "Running import script on EC2 with DRY_RUN=${DRY_RUN}..."

          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
          set -e

          WORK_DIR="/opt/mingtat-erp"
          BACKEND_DIR="\${WORK_DIR}/backend"
          ENV_FILE="\${BACKEND_DIR}/.env"

          if [ ! -f "\${ENV_FILE}" ]; then
            echo "ERROR: .env file not found at \${ENV_FILE}"
            exit 1
          fi

          export \$(grep -v '^#' "\${ENV_FILE}" | xargs)

          echo "=== Pulling latest code ==="
          cd "\${WORK_DIR}"
          git pull origin main

          echo "=== Running import script ==="
          cd "\${BACKEND_DIR}"
          DRY_RUN="${DRY_RUN}" npx ts-node src/scripts/import-payments-csv.ts
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
