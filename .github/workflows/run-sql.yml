name: Run One-off SQL
on:
  workflow_dispatch:
    inputs:
      sql:
        description: 'SQL to execute'
        required: true
        type: string
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SQL on EC2 via Docker
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 43.199.108.130
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /opt/mingtat-erp/backend
            export $(cat .env | grep -v '^#' | grep DATABASE_URL | xargs)
            PGPASSWORD=$(echo $DATABASE_URL | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p') \
            psql "$DATABASE_URL" -c "${{ github.event.inputs.sql }}"
