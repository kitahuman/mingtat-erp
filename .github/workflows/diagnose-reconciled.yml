name: Diagnose Reconciled Status

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostic SQL on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker exec mingtat-erp-postgres-1 psql -U postgres -d mingtat_erp -c "
            SELECT '=== BankTransaction matched counts ===' as section;
            SELECT COUNT(*) as total, COUNT(matched_id) as with_matched_id FROM bank_transactions;

            SELECT '=== matched_type values ===' as section;
            SELECT matched_type, COUNT(*) as cnt FROM bank_transactions WHERE matched_id IS NOT NULL GROUP BY matched_type;

            SELECT '=== Sample matched bank_transactions ===' as section;
            SELECT id, matched_id, matched_type, match_status FROM bank_transactions WHERE matched_id IS NOT NULL LIMIT 5;

            SELECT '=== bank_transaction_matches count ===' as section;
            SELECT COUNT(*) FROM bank_transaction_matches;

            SELECT '=== Sample junction table ===' as section;
            SELECT * FROM bank_transaction_matches LIMIT 5;

            SELECT '=== PaymentIn IDs in BankTransaction.matched_id ===' as section;
            SELECT bt.matched_id, bt.matched_type, pi.id as payment_in_id FROM bank_transactions bt JOIN payment_ins pi ON pi.id = bt.matched_id WHERE bt.matched_type = 'payment_in' LIMIT 5;
            "
