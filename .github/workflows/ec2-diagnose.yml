name: EC2 Diagnose and Force Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'diagnose'
        type: choice
        options:
          - 'diagnose'
          - 'force-deploy'

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Diagnose
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          echo "=== docker ps ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.CreatedAt}}"
          echo ""
          echo "=== Current git commit on EC2 ==="
          cd /opt/mingtat-erp
          git log --oneline -3
          ENDSSH

      - name: Force Deploy
        if: ${{ github.event.inputs.action == 'force-deploy' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e
          cd /opt/mingtat-erp
          echo "=== Pulling latest git ==="
          git fetch origin main
          git reset --hard origin/main
          echo "=== docker compose pull ==="
          docker compose pull
          echo "=== docker compose up ==="
          docker compose up -d --force-recreate
          echo "=== After force deploy ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.CreatedAt}}"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
