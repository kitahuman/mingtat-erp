name: Merge Duplicate PaymentIn Dry Run DCL

on:
  workflow_dispatch:

jobs:
  dryrun:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy SQL script to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
            scripts/merge-duplicate-payments-dryrun.sql \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/merge_dryrun.sql

      - name: Run dry-run SQL on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          cd /opt/mingtat-erp/backend
          export $(cat .env | grep -v '^#' | grep DATABASE_URL | xargs)
          PGPASSWORD=$(echo $DATABASE_URL | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p') \
          psql "$DATABASE_URL" -f /tmp/merge_dryrun.sql
          rm -f /tmp/merge_dryrun.sql
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
