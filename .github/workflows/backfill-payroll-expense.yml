name: Backfill Payroll Expense Data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (read-only, no modifications)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  backfill:
    name: Backfill Payroll Expense Data
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run dry-run (read-only check)
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "Running DRY RUN - checking what would be modified..."
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          WORK_DIR="/opt/mingtat-erp"
          ENV_FILE="${WORK_DIR}/backend/.env"

          if [ ! -f "${ENV_FILE}" ]; then
            echo "ERROR: .env file not found at ${ENV_FILE}"
            exit 1
          fi

          DATABASE_URL=$(grep "^DATABASE_URL=" "${ENV_FILE}" | cut -d'=' -f2-)

          if [ -z "${DATABASE_URL}" ]; then
            echo "ERROR: DATABASE_URL not found in .env"
            exit 1
          fi

          echo "=========================================="
          echo "DRY RUN: Checking affected records"
          echo "=========================================="
          echo ""

          # Note: payrolls and payment_outs tables have NO deleted_at column
          # Only expenses table has deleted_at

          echo "1. Expenses needing amount fix (total_amount != net_amount from payroll):"
          psql "${DATABASE_URL}" -c "
          SELECT
            e.id AS expense_id,
            e.source_ref_id AS payroll_id,
            e.total_amount AS current_amount,
            p.net_amount AS correct_amount,
            (p.net_amount - e.total_amount) AS difference,
            e.item
          FROM expenses e
          INNER JOIN payrolls p ON e.source_ref_id = p.id
          WHERE e.source = 'PAYROLL'
            AND e.deleted_at IS NULL
            AND e.total_amount != p.net_amount
          ORDER BY e.id DESC
          LIMIT 30;
          " 2>&1

          echo ""
          echo "2. PaymentOut records linked to payroll but missing expense_id:"
          psql "${DATABASE_URL}" -c "
          SELECT
            po.id AS payment_out_id,
            po.payroll_id,
            po.amount,
            po.date
          FROM payment_outs po
          WHERE po.payroll_id IS NOT NULL
            AND po.expense_id IS NULL
          ORDER BY po.id DESC
          LIMIT 30;
          " 2>&1

          echo ""
          echo "3. PaymentOut records missing PaymentOutAllocation:"
          psql "${DATABASE_URL}" -c "
          SELECT
            po.id AS payment_out_id,
            po.payroll_id,
            po.amount,
            COUNT(poa.id) AS allocation_count
          FROM payment_outs po
          LEFT JOIN payment_out_allocations poa
            ON poa.payment_out_allocation_payment_out_id = po.id
          WHERE po.payroll_id IS NOT NULL
          GROUP BY po.id, po.payroll_id, po.amount
          HAVING COUNT(poa.id) = 0
          ORDER BY po.id DESC
          LIMIT 30;
          " 2>&1

          echo ""
          echo "4. Summary:"
          psql "${DATABASE_URL}" -c "
          SELECT
            (SELECT COUNT(*) FROM expenses e
             INNER JOIN payrolls p ON e.source_ref_id = p.id
             WHERE e.source = 'PAYROLL' AND e.deleted_at IS NULL
               AND e.total_amount != p.net_amount) AS expenses_to_fix,
            (SELECT COUNT(*) FROM payment_outs po
             WHERE po.payroll_id IS NOT NULL AND po.expense_id IS NULL) AS payment_outs_missing_expense_id,
            (SELECT COUNT(*) FROM (
               SELECT po.id FROM payment_outs po
               LEFT JOIN payment_out_allocations poa ON poa.payment_out_allocation_payment_out_id = po.id
               WHERE po.payroll_id IS NOT NULL
               GROUP BY po.id HAVING COUNT(poa.id) = 0
             ) sub) AS payment_outs_missing_allocation;
          " 2>&1

          echo ""
          echo "5. Current expense payment status for PAYROLL expenses:"
          psql "${DATABASE_URL}" -c "
          SELECT
            COUNT(*) AS total_payroll_expenses,
            COUNT(CASE WHEN payment_status = 'paid' THEN 1 END) AS paid_count,
            COUNT(CASE WHEN payment_status = 'partial' THEN 1 END) AS partial_count,
            COUNT(CASE WHEN payment_status = 'unpaid' THEN 1 END) AS unpaid_count
          FROM expenses
          WHERE source = 'PAYROLL'
            AND deleted_at IS NULL;
          " 2>&1

          echo ""
          echo "=========================================="
          echo "DRY RUN completed. Review the results above."
          echo "If satisfied, re-run with dry_run=false to apply changes."
          echo "=========================================="
          EOF

      - name: Run actual backfill
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          echo "Running ACTUAL BACKFILL - modifying production data..."
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          WORK_DIR="/opt/mingtat-erp"
          ENV_FILE="${WORK_DIR}/backend/.env"

          if [ ! -f "${ENV_FILE}" ]; then
            echo "ERROR: .env file not found at ${ENV_FILE}"
            exit 1
          fi

          DATABASE_URL=$(grep "^DATABASE_URL=" "${ENV_FILE}" | cut -d'=' -f2-)

          if [ -z "${DATABASE_URL}" ]; then
            echo "ERROR: DATABASE_URL not found in .env"
            exit 1
          fi

          echo "=========================================="
          echo "BACKFILL: Fixing payroll expense data"
          echo "=========================================="
          echo ""

          psql "${DATABASE_URL}" << 'SQLEOF'
          BEGIN;

          -- FIX 1: Update expense total_amount to use net_amount (淨薪金)
          -- payrolls table has no deleted_at column
          UPDATE expenses e
          SET total_amount = p.net_amount,
              updated_at = NOW()
          FROM payrolls p
          WHERE e.source = 'PAYROLL'
            AND e.source_ref_id = p.id
            AND e.deleted_at IS NULL
            AND e.total_amount != p.net_amount;

          -- FIX 2: Set expense_id on PaymentOut records (single-expense payrolls only)
          -- payment_outs has no deleted_at column
          UPDATE payment_outs po
          SET expense_id = e.id,
              updated_at = NOW()
          FROM payrolls p
          INNER JOIN expenses e ON e.source = 'PAYROLL' AND e.source_ref_id = p.id
          WHERE po.payroll_id = p.id
            AND e.deleted_at IS NULL
            AND po.expense_id IS NULL
            AND (SELECT COUNT(*) FROM expenses e2
                 WHERE e2.source = 'PAYROLL' AND e2.source_ref_id = p.id AND e2.deleted_at IS NULL) = 1;

          -- FIX 3: Create PaymentOutAllocation records for missing links
          INSERT INTO payment_out_allocations (
            payment_out_allocation_payment_out_id,
            payment_out_allocation_expense_id,
            payment_out_allocation_amount,
            created_at,
            updated_at
          )
          SELECT
            po.id,
            e.id,
            po.amount,
            NOW(),
            NOW()
          FROM payment_outs po
          INNER JOIN payrolls p ON po.payroll_id = p.id
          INNER JOIN expenses e ON e.source = 'PAYROLL' AND e.source_ref_id = p.id
          WHERE e.deleted_at IS NULL
            AND NOT EXISTS (
              SELECT 1 FROM payment_out_allocations poa
              WHERE poa.payment_out_allocation_payment_out_id = po.id
                AND poa.payment_out_allocation_expense_id = e.id
            )
          ON CONFLICT DO NOTHING;

          -- FIX 4: Recalculate paid_amount for all PAYROLL expenses
          UPDATE expenses e
          SET paid_amount = COALESCE((
            SELECT SUM(poa.payment_out_allocation_amount)
            FROM payment_out_allocations poa
            WHERE poa.payment_out_allocation_expense_id = e.id
          ), 0),
              updated_at = NOW()
          WHERE e.source = 'PAYROLL'
            AND e.deleted_at IS NULL;

          -- FIX 5: Recalculate payment_status based on paid_amount vs total_amount
          UPDATE expenses e
          SET payment_status = CASE
            WHEN e.paid_amount >= e.total_amount THEN 'paid'
            WHEN e.paid_amount > 0 THEN 'partial'
            ELSE 'unpaid'
          END,
              updated_at = NOW()
          WHERE e.source = 'PAYROLL'
            AND e.deleted_at IS NULL;

          COMMIT;
          SQLEOF

          echo ""
          echo "=========================================="
          echo "VERIFICATION: Results after backfill"
          echo "=========================================="
          echo ""

          psql "${DATABASE_URL}" -c "
          SELECT
            COUNT(*) AS total_payroll_expenses,
            COUNT(CASE WHEN payment_status = 'paid' THEN 1 END) AS paid_count,
            COUNT(CASE WHEN payment_status = 'partial' THEN 1 END) AS partial_count,
            COUNT(CASE WHEN payment_status = 'unpaid' THEN 1 END) AS unpaid_count,
            SUM(total_amount) AS total_expense_amount,
            SUM(paid_amount) AS total_paid_amount
          FROM expenses
          WHERE source = 'PAYROLL'
            AND deleted_at IS NULL;
          " 2>&1

          echo ""
          echo "Sample of fixed expenses (latest 20):"
          psql "${DATABASE_URL}" -c "
          SELECT
            e.id,
            e.source_ref_id AS payroll_id,
            e.total_amount,
            e.paid_amount,
            e.payment_status,
            e.item
          FROM expenses e
          WHERE e.source = 'PAYROLL'
            AND e.deleted_at IS NULL
          ORDER BY e.id DESC
          LIMIT 20;
          " 2>&1

          echo ""
          echo "=========================================="
          echo "BACKFILL completed successfully!"
          echo "=========================================="
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
