name: Docker Build & Deploy to EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kitahuman/mingtat-erp-backend
  FRONTEND_IMAGE: ghcr.io/kitahuman/mingtat-erp-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version info
        id: version
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "deploy_time=$DEPLOY_TIME" >> $GITHUB_OUTPUT
          echo "tag=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Create version.json for frontend
        run: |
          echo '{"commit":"${{ steps.version.outputs.commit_hash }}","deployTime":"${{ steps.version.outputs.deploy_time }}"}' > frontend/public/version.json

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
          build-args: |
            BACKEND_URL=http://backend:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            echo "=== [1/5] Login to GHCR ==="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kitahuman --password-stdin

            echo "=== [2/5] Update docker-compose.yml ==="
            cd /opt/mingtat-erp
            # Pull latest docker-compose.yml from repo
            curl -sL "https://raw.githubusercontent.com/kitahuman/mingtat-erp/main/docker-compose.yml" -o docker-compose.yml

            echo "=== [3/5] Pull new images ==="
            docker compose pull

            echo "=== [4/5] Start containers ==="
            docker compose up -d --remove-orphans

            echo "=== [5/5] Verify deployment ==="
            sleep 10
            # Check backend health
            curl -sf http://localhost:3001/api || echo "WARNING: Backend health check failed, may still be starting..."
            # Check frontend
            curl -sf http://localhost:3000 > /dev/null || echo "WARNING: Frontend health check failed, may still be starting..."

            echo "=== Deployment Complete ==="
            docker compose ps
