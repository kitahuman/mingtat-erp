name: Docker Build & Deploy to EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kitahuman/mingtat-erp-backend
  FRONTEND_IMAGE: ghcr.io/kitahuman/mingtat-erp-frontend

jobs:
  # ──────────────────────────────────────────
  # Job 1: Detect which paths changed
  # ──────────────────────────────────────────
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────
  # Job 2: Build & push backend image (conditional)
  # ──────────────────────────────────────────
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      built: ${{ steps.set-built.outputs.built }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "tag=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Mark backend as built
        id: set-built
        run: echo "built=true" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────
  # Job 3: Build & push frontend image (conditional)
  # ──────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      built: ${{ steps.set-built.outputs.built }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DEPLOY_TIME=$(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M:%S HKT')
          echo "tag=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "deploy_time=$DEPLOY_TIME" >> $GITHUB_OUTPUT

      - name: Create version.json for frontend
        run: |
          echo '{"commit":"${{ steps.version.outputs.tag }}","deployTime":"${{ steps.version.outputs.deploy_time }}"}' > frontend/public/version.json

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
          build-args: |
            BACKEND_URL=http://backend:3001
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Mark frontend as built
        id: set-built
        run: echo "built=true" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────
  # Job 4: Deploy to EC2
  # Runs when at least one image was (re)built
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-backend
      - build-frontend
    # Deploy when either build job succeeded (skipped jobs are not "failure")
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/opt/mingtat-erp/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            echo "=== [1/5] Login to GHCR ==="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kitahuman --password-stdin

            echo "=== [2/5] Prune old images to free disk space ==="
            docker image prune -af --filter "until=24h"

            echo "=== [3/5] Pull new images ==="
            cd /opt/mingtat-erp
            docker compose pull

            echo "=== [3.5/5] Resolve any failed Prisma migrations ==="
            # If a previous migration was marked as failed in the DB, resolve it before deploying.
            # This is a one-time recovery step for the 20260515000000_add_director_role migration
            # that failed due to an invalid COMMENT ON COLUMN statement.
            docker compose run --rm --no-deps backend sh -c \
              "npx prisma migrate resolve --rolled-back 20260515000000_add_director_role 2>&1 || true"

            echo "=== [4/5] Start containers ==="
            # Run without -e so we can capture logs before failing
            docker compose up -d --remove-orphans || {
              echo "=== [ERROR] docker compose up failed — dumping backend logs ==="
              docker logs mingtat-erp-backend --tail 100 2>&1 || true
              echo "=== [ERROR] docker compose ps ==="
              docker compose ps
              exit 1
            }

            echo "=== [5/5] Verify deployment ==="
            sleep 15
            # Check backend health
            curl -sf http://localhost:3001/api || echo "WARNING: Backend health check failed, may still be starting..."
            # Check frontend
            curl -sf http://localhost:3000 > /dev/null || echo "WARNING: Frontend health check failed, may still be starting..."

            echo ""
            echo "=== Deployment Complete ==="
            docker compose ps
