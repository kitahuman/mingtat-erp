name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -e

            echo "=== [1/6] Git Pull ==="
            cd /opt/mingtat-erp
            git pull origin main

            echo "=== [2/6] Backend Build ==="
            cd /opt/mingtat-erp/backend
            npm install --legacy-peer-deps
            npm run build

            echo "=== [3/6] Restart Backend ==="
            pm2 restart mingtat-erp-backend
            sleep 2

            echo "=== [4/6] Frontend Build ==="
            cd /opt/mingtat-erp/frontend
            npm install --legacy-peer-deps
            npm run build

            echo "=== [5/6] Copy Frontend Assets ==="
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            echo "=== [6/6] Restart Frontend ==="
            pm2 restart mingtat-erp-frontend
            sleep 2

            echo "=== Deployment Complete ==="
            pm2 list
