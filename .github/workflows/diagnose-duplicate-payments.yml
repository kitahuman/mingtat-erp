name: Diagnose Duplicate PaymentIn

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run duplicate PaymentIn diagnostic
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          cd /opt/mingtat-erp/backend
          export $(cat .env | grep -v '^#' | grep DATABASE_URL | xargs)

          echo "===== DUPLICATE GROUPS (date + reference_no + bank_account_id) ====="
          PGPASSWORD=$(echo $DATABASE_URL | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p') \
          psql "$DATABASE_URL" -x -c "
          SELECT
            pi.date AS date,
            pi.reference_no,
            pi.bank_account_id,
            ba.bank_name || ' - ' || ba.account_no AS bank_account,
            c.internal_prefix AS company,
            COUNT(pi.id) AS payment_count,
            SUM(pi.amount) AS total_amount
          FROM payment_ins pi
          LEFT JOIN bank_accounts ba ON ba.id = pi.bank_account_id
          LEFT JOIN companies c ON c.id = ba.company_id
          WHERE pi.reference_no IS NOT NULL
            AND pi.reference_no != ''
          GROUP BY pi.date, pi.reference_no, pi.bank_account_id, ba.bank_name, ba.account_no, c.internal_prefix
          HAVING COUNT(pi.id) > 1
          ORDER BY pi.date DESC, pi.reference_no;
          "

          echo ""
          echo "===== INDIVIDUAL RECORDS IN DUPLICATE GROUPS ====="
          PGPASSWORD=$(echo $DATABASE_URL | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p') \
          psql "$DATABASE_URL" -c "
          SELECT
            pi.id,
            pi.date,
            pi.reference_no,
            pi.bank_account_id,
            c.internal_prefix AS company,
            pi.amount,
            (SELECT COUNT(*) FROM payment_in_allocations pia WHERE pia.payment_in_allocation_payment_in_id = pi.id) AS allocation_count
          FROM payment_ins pi
          LEFT JOIN bank_accounts ba ON ba.id = pi.bank_account_id
          LEFT JOIN companies c ON c.id = ba.company_id
          WHERE pi.reference_no IS NOT NULL
            AND pi.reference_no != ''
            AND (pi.date, pi.reference_no, pi.bank_account_id) IN (
              SELECT date, reference_no, bank_account_id
              FROM payment_ins
              WHERE reference_no IS NOT NULL
                AND reference_no != ''
              GROUP BY date, reference_no, bank_account_id
              HAVING COUNT(id) > 1
            )
          ORDER BY pi.date DESC, pi.reference_no, pi.id;
          "
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
